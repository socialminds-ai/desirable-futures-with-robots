# Local development stack only — NOT used in production.
# Mirrors the target LAMP host (Apache + PHP + MariaDB) so the vanilla app runs
# unchanged when deployed. Bring up with:  docker compose up --build
# Then open http://localhost:8080  (phpMyAdmin-style access via the db port).
services:
  web:
    build: ./docker/php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: desirabl
      DB_USER: desirabl
      DB_PASS: devpassword
      MAIL_HOST: mail
      MAIL_PORT: "1025"
      MAIL_FROM: "no-reply@desirable-futures-with-robots.org"
    depends_on:
      - db
      - mail

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: desirabl
      MARIADB_USER: desirabl
      MARIADB_PASSWORD: devpassword
      MARIADB_ROOT_PASSWORD: devroot
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"

  # Catches all outgoing mail in dev; web UI at http://localhost:8025
  mail:
    image: axllent/mailpit
    ports:
      - "8025:8025"

volumes:
  dbdata:
